<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>匠心守初心 · 青春担使命</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #1a0a0a;
    position: relative;
  }

  /* === 底层纹理：暗纹绸缎感 === */
  .texture {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.008) 2px,
        rgba(255,255,255,0.008) 4px
      ),
      radial-gradient(ellipse 120% 80% at 20% 50%, rgba(139,24,24,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 100% 100% at 80% 30%, rgba(180,40,40,0.1) 0%, transparent 50%);
  }

  /* === 左侧装饰：水墨山峦剪影 === */
  .mountain-left {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 650px;
    height: 100%;
    opacity: 0.05;
    background:
      linear-gradient(165deg, transparent 30%, #c0392b 30.5%, #c0392b 31%, transparent 31.5%),
      linear-gradient(155deg, transparent 45%, #c0392b 45.5%, #c0392b 46%, transparent 46.5%),
      linear-gradient(170deg, transparent 60%, #c0392b 60.5%, #c0392b 61%, transparent 61.5%);
  }

  /* === 右侧装饰：建筑轮廓 === */
  .building-right {
    position: absolute;
    right: 0;
    bottom: 0;
    width: 500px;
    height: 100%;
    opacity: 0.035;
  }
  .building-right::before {
    content: '';
    position: absolute;
    right: 80px;
    bottom: 0;
    width: 120px;
    height: 450px;
    background: linear-gradient(to top, #c0392b, transparent);
    clip-path: polygon(30% 100%, 0% 15%, 15% 0%, 50% 0%, 85% 0%, 100% 15%, 70% 100%);
  }
  .building-right::after {
    content: '';
    position: absolute;
    right: 220px;
    bottom: 0;
    width: 180px;
    height: 550px;
    background: linear-gradient(to top, #c0392b, transparent);
    clip-path: polygon(20% 100%, 5% 20%, 20% 5%, 40% 0%, 60% 0%, 80% 5%, 95% 20%, 80% 100%);
  }

  /* === 顶部金色细线 === */
  .top-line {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.45), transparent);
  }

  /* === 底部金色细线 === */
  .bottom-line {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.45), transparent);
  }

  /* === 中央内容区 === */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  /* === 顶部装饰：五角星 + 横线 === */
  .top-ornament {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 50px;
  }
  .top-ornament .line {
    width: 140px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.55));
  }
  .top-ornament .line:last-child {
    background: linear-gradient(90deg, rgba(212,175,55,0.55), transparent);
  }
  .star {
    font-size: 20px;
    color: rgba(212,175,55,0.65);
    letter-spacing: 10px;
  }

  /* === 主标题 === */
  .main-title {
    font-family: 'Noto Serif SC', 'SimSun', 'FangSong', serif;
    font-size: 76px;
    font-weight: 900;
    color: #d4af37;
    letter-spacing: 18px;
    line-height: 1.3;
    text-shadow:
      0 0 80px rgba(212,175,55,0.12),
      0 2px 4px rgba(0,0,0,0.4);
    margin-bottom: 24px;
  }

  /* === 分隔装饰 === */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .divider .line {
    width: 220px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.35));
  }
  .divider .line:last-child {
    background: linear-gradient(90deg, rgba(212,175,55,0.35), transparent);
  }
  .divider .diamond {
    width: 8px;
    height: 8px;
    background: rgba(212,175,55,0.45);
    transform: rotate(45deg);
  }

  /* === 副标题 === */
  .subtitle {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 30px;
    font-weight: 300;
    color: rgba(255,255,255,0.72);
    letter-spacing: 14px;
    margin-bottom: 70px;
  }

  /* === 底部信息（加大字号+上移） === */
  .footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 30px;
  }
  .organizer {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 26px;
    font-weight: 500;
    color: rgba(212,175,55,0.65);
    letter-spacing: 12px;
  }
  .year {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    letter-spacing: 8px;
  }

  /* === 角落装饰 === */
  .corner {
    position: absolute;
    width: 70px;
    height: 70px;
    border-color: rgba(212,175,55,0.12);
    border-style: solid;
  }
  .corner.tl { top: 40px; left: 40px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 40px; right: 40px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 40px; left: 40px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 40px; right: 40px; border-width: 0 1px 1px 0; }

  /* === 中央光晕 === */
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 900px;
    height: 450px;
    background: radial-gradient(ellipse, rgba(180,40,40,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="texture"></div>
  <div class="mountain-left"></div>
  <div class="building-right"></div>
  <div class="glow"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="top-line"></div>
  <div class="bottom-line"></div>

  <div class="content">
    <div class="top-ornament">
      <div class="line"></div>
      <div class="star">★ ★ ★</div>
      <div class="line"></div>
    </div>

    <div class="main-title">匠心守初心 · 青春担使命</div>

    <div class="divider">
      <div class="line"></div>
      <div class="diamond"></div>
      <div class="line"></div>
    </div>

    <div class="subtitle">五 四 青 年 活 动</div>

    <div class="footer">
      <div class="organizer">区城投集团</div>
      <div class="year">2026</div>
    </div>
  </div>
</body>
</html>
